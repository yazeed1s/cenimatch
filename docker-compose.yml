services:
  db:
    image: apache/age:release_PG16_1.6.0
    container_name: cenimatch-db
    environment:
      POSTGRES_USER: u
      POSTGRES_PASSWORD: "112233"
      POSTGRES_DB: cenimatch-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data:/data
    restart: unless-stopped

volumes:
  pgdata:
