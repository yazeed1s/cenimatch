services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: cenimatch-backend
    environment:
      ENVIRONMENT: dev
      DATABASE_URL: postgresql://u:112233@cenimatch-db:5432/cenimatch-db
      JWT_SECRET: ${JWT_SECRET:-some_long_random_string}
      JWT_ISSUER: ${JWT_ISSUER:-cenimatch}
      PORT: "8080"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    # ports:
    #   - "8080:8080"
    restart: unless-stopped
    networks:
      - cenimatch_db_net

  frontend:
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: cenimatch-frontend
    depends_on:
      backend:
        condition: service_started
    # ports:
    #   - "5173:80"
    restart: unless-stopped
    networks:
      - cenimatch_db_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cenimatch-cloudflared
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN:-MISSING_CLOUDFLARED_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - cenimatch_db_net

networks:
  cenimatch_db_net:
    external: true
    name: cenimatch_default
